<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXP 6 | Live Global Sports Dashboard - White Edition</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700;900&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        :root {
            --primary: #FF6B00;
            --primary-light: #FF9E00;
            --accent: #FFD000;
            --dark: #0f172a;
            --slate-gray: #64748b;
            --white: #ffffff;
            --light-bg: #f8fafc;
            --grad: linear-gradient(135deg, #FF6B00, #FFD000);
            --display: 'Oswald', sans-serif;
        }

        * { margin:0; padding:0; box-sizing: border-box; }

        body {
            font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
            color: var(--dark);
            background-color: var(--light-bg);
            line-height: 1.5;
            padding: 100px 0;
            background-image: 
                radial-gradient(at 0% 0%, rgba(255, 107, 0, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(255, 107, 0, 0.05) 0px, transparent 50%);
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 0 40px; }

        .header-section { text-align: center; margin-bottom: 80px; }
        
        h1 { font-family: var(--display); font-weight: 700; font-size: 5rem; letter-spacing: -2px; text-transform: uppercase; line-height: 0.9; margin-bottom: 20px; color: var(--dark); }
        h1 span { color: var(--primary); font-style: italic; }

        .live-ticker { 
            display: inline-flex; 
            align-items: center; 
            gap: 10px; 
            color: var(--primary); 
            font-weight: 900; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            font-size: 0.85rem; 
            margin-bottom: 20px;
        }
        
        .pulse { width: 12px; height: 12px; background: var(--primary); border-radius: 50%; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 107, 0, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(255, 107, 0, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 107, 0, 0); } }

        .search-area {
            max-width: 700px;
            margin: 0 auto 80px;
            position: relative;
            display: none; /* Ready mode */
        }

        #search-match {
            width: 100%;
            padding: 24px 70px;
            border-radius: 20px;
            border: 2.5px solid #e2e8f0;
            background: white;
            color: var(--dark);
            font-size: 1.15rem;
            font-weight: 700;
            outline: none;
            transition: 0.4s;
            box-shadow: 0 10px 40px rgba(0,0,0,0.02);
        }

        #search-match:focus { border-color: var(--primary); box-shadow: 0 15px 50px rgba(255,107,0,0.1); }

        .bi-trophy { position: absolute; left: 30px; top: 22px; color: var(--primary); font-size: 1.6rem; }

        .btn-live {
            background: var(--grad);
            color: white;
            border: none;
            padding: 25px 60px;
            border-radius: 15px;
            font-family: var(--display);
            font-weight: 700;
            font-size: 1.4rem;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 20px 40px rgba(255, 107, 0, 0.2);
            transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            display: block;
            margin: 0 auto;
        }

        .btn-live:hover { transform: scale(1.05) translateY(-5px); box-shadow: 0 40px 100px rgba(255, 107, 0, 0.4); }

        .scores-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 40px;
        }

        /* Match Card - Premium White UI */
        .match-card {
            background: var(--white);
            border: 1px solid rgba(0,0,0,0.02);
            padding: 40px;
            border-radius: 50px;
            position: relative;
            transition: 0.4s;
            box-shadow: 0 40px 120px rgba(0,0,0,0.04);
            animation: cardSlideUp 0.8s cubic-bezier(0.165, 0.84, 0.44, 1) forwards;
        }

        @keyframes cardSlideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }

        .match-card:hover { transform: translateY(-15px); border-color: var(--primary); box-shadow: 0 60px 150px rgba(255, 107, 0, 0.1); }

        .match-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; border-bottom: 2px solid #f1f5f9; padding-bottom: 15px; }
        
        .match-status { font-weight: 950; font-size: 0.75rem; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; }
        .match-time { color: var(--slate-gray); font-size: 0.8rem; font-weight: 700; }

        .score-board { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 30px; 
            margin-bottom: 30px;
        }

        .team { flex: 1; text-align: center; }
        .team-name { font-family: var(--display); font-size: 1.6rem; color: var(--dark); display: block; line-height: 1; margin-bottom: 5px; }
        .team-sub { color: var(--slate-gray); font-size: 0.8rem; font-weight: 700; }

        .score-display { 
            font-family: var(--display); 
            font-size: 3.5rem; 
            color: var(--white); 
            background: var(--dark); 
            padding: 10px 25px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(15, 23, 42, 0.2);
            text-shadow: 0 0 20px rgba(255, 107, 0, 0.2);
        }

        .arena-info { 
            background: #f8fafc; 
            padding: 20px; 
            border-radius: 25px; 
            text-align: center;
            border: 1px solid #f1f5f9;
        }
        
        .arena-info p { font-size: 0.9rem; font-weight: 700; color: var(--slate-gray); margin-bottom: 5px; }
        .arena-info i { color: var(--primary); margin-right: 8px; }

        #sync-loader { text-align: center; display: none; margin-top: -30px; margin-bottom: 80px; font-weight: 900; color: var(--primary); text-transform: uppercase; letter-spacing: 2px; }

        @media (max-width: 768px) { h1 { font-size: 3rem; } .container { padding: 0 20px; } .scores-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <header class="header-section">
            <div class="live-ticker"><span class="pulse"></span> Live Broadcast Feed</div>
            <h1 id="sports-title">GLOBAL<span>SCORES.</span></h1>
            <p style="color:var(--slate-gray); font-weight:900; text-transform:uppercase; letter-spacing:4px; font-size:0.8rem;">API Real-Time Arena Hub</p>
        </header>

        <div id="hub-search" class="search-area">
            <i class="bi bi-trophy"></i>
            <input type="text" id="search-match" placeholder="SEARCH TEAMS, ARENAS, OR FIXTURES...">
        </div>

        <button id="btn-sync" class="btn-live">Sync Arena Assets</button>
        <div id="sync-loader">SYNCHRONIZING WITH GLOBAL SPORTS NODES...</div>

        <div id="scores-grid" class="scores-grid">
            <!-- Feed injected via API -->
        </div>
    </div>

    <!-- Logic Integration -->
    <script>
        const syncBtn = document.getElementById('btn-sync');
        const grid = document.getElementById('scores-grid');
        const loader = document.getElementById('sync-loader');
        const searchInput = document.getElementById('search-match');
        const searchBox = document.getElementById('hub-search');

        let matchData = [];

        const bootBroadcast = () => {
            syncBtn.addEventListener('click', runDiscoveryPhase);
            searchInput.addEventListener('input', (e) => handleSearch(e.target.value.toLowerCase()));
        };

        const runDiscoveryPhase = async () => {
            try {
                loader.style.display = 'block';
                syncBtn.style.display = 'none';

                const response = await fetch('https://jsonplaceholder.typicode.com/users');
                if (!response.ok) throw new Error('SIGNAL HANDSHAKE FAILED');
                
                matchData = await response.json();

                searchBox.style.display = 'block';
                renderLiveFeed(matchData);
                loader.style.display = 'none';

            } catch (err) {
                loader.innerHTML = `<span style="color:#ef4444;">CONNECTION INTERRUPTED: ${err.message}</span>`;
            }
        };

        const renderLiveFeed = (data) => {
            grid.innerHTML = '';
            
            if (data.length === 0) {
                grid.innerHTML = `<div style="grid-column: 1/-1; text-align:center; padding:100px; font-weight:950; color:var(--slate-gray);">NO MATCHES IDENTIFIED IN RECENT ASSETS.</div>`;
                return;
            }

            data.forEach(match => {
                const card = createMatchCard(match);
                grid.appendChild(card);
            });
        };

        /**
         * Fixture Card - Lumina White Architecture
         */
        const createMatchCard = (data) => {
            const div = document.createElement('article');
            div.className = 'match-card';
            
            const teamA = data.name.split(' ')[0].toUpperCase();
            const teamB = data.company.name.split(' ')[0].toUpperCase();
            const scoreA = Math.floor(Math.random() * 5);
            const scoreB = Math.floor(Math.random() * 5);
            const status = Math.random() > 0.3 ? 'LIVE' : 'FINAL';

            div.innerHTML = `
                <div class="match-header">
                    <span class="match-status" style="color: ${status === 'LIVE' ? 'var(--primary)' : 'var(--slate-gray)'}">
                        ${status === 'LIVE' ? '<span class="pulse" style="display:inline-block; margin-right:5px; width:8px; height:8px;"></span> Live Feed' : 'Broadcast Ended'} 
                    </span>
                    <span class="match-time">Fixt. ID: #${data.id}SC0</span>
                </div>
                <div class="score-board">
                    <div class="team">
                        <span class="team-name">${teamA}</span>
                        <span class="team-sub">${data.username} HUB</span>
                    </div>
                    <div class="score-display">${scoreA}:${scoreB}</div>
                    <div class="team">
                        <span class="team-name">${teamB}</span>
                        <span class="team-sub">GLOBAL CORP</span>
                    </div>
                </div>
                <div class="arena-info">
                    <p><i class="bi bi-geo-alt-fill"></i> ${data.address.city.toUpperCase()} SPORTS ARCHITECTURE</p>
                    <p style="font-size:0.75rem; color:var(--slate-gray); font-weight:800;">HUB DATA: ${data.email.toLowerCase()}</p>
                </div>
            `;
            return div;
        };

        const handleSearch = (q) => {
            const filtered = matchData.filter(m => 
                m.name.toLowerCase().includes(q) || 
                m.address.city.toLowerCase().includes(q) ||
                m.company.name.toLowerCase().includes(q)
            );
            renderLiveFeed(filtered);
        };

        bootBroadcast();
    </script>
</body>
</html>
